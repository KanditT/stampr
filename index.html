<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart of Music: Digital Composition Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&family=Prompt:wght@300;400;600&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <style>
      body {
        font-family: "Nunito", sans-serif;
        background-color: #E8DCFF;
      }
      .font-display {
        font-family: "Quicksand", sans-serif;
      }
      .font-thai {
        font-family: "Prompt", sans-serif;
      }

      /* THE MUSICAL STAFF - 5 Horizontal Parallel Lines */
      .staff-container {
        position: relative;
        width: 100%;
        height: 80px;
        margin-bottom: 40px;
        background-image: linear-gradient(
          to bottom,
          transparent 19px,
          #D0BFFF 20px,
          transparent 21px,
          transparent 31px,
          #D0BFFF 32px,
          transparent 33px,
          transparent 43px,
          #D0BFFF 44px,
          transparent 45px,
          transparent 55px,
          #D0BFFF 56px,
          transparent 57px,
          transparent 67px,
          #D0BFFF 68px,
          transparent 69px
        );
        background-size: 100% 80px;
      }

      .manuscript-paper {
        background-color: #F3EEFF;
        background-image: radial-gradient(#D0BFFF 1px, transparent 1px);
        background-size: 20px 20px;
        padding: 60px 40px;
        min-height: 700px;
        box-shadow: 0 10px 30px rgba(155, 95, 227, 0.12);
        border: 1px solid #D0BFFF;
        border-radius: 16px;
      }

      @media print {
        .no-print {
          display: none;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
"qrcode": "https://esm.sh/qrcode@1.5.3",
          "html-to-image": "https://esm.sh/html-to-image@1.11.11"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
